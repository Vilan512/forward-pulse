name: ForwardPulse 24h Radar

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  harvest-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install openai feedparser

      - name: Check API key
        run: |
          if [ -z "$MIMO_API_KEY" ]; then
            echo "::warning::MIMO_API_KEY is not set! Agent step will be skipped."
          else
            echo "MIMO_API_KEY is set (length: ${#MIMO_API_KEY})"
          fi
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}

      - name: Harvest raw data
        run: python data_scraper.py

      - name: Analyze and update data.json
        id: agent
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
        run: |
          echo "Starting agent_update.py..."
          python agent_update.py && echo "agent_status=success" >> $GITHUB_OUTPUT || echo "agent_status=failed" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes detected - RSS feeds may have returned identical data"
            exit 0
          fi
          git commit -m "radar: auto-update $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          git pull --rebase origin main || true
          git push origin main
          echo "Successfully pushed update"
