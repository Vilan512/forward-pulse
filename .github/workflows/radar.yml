name: ForwardPulse 24h Radar

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  harvest-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install openai feedparser

      - name: Harvest raw data
        run: python data_scraper.py

      - name: Analyze and update data.json
        env:
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
        run: python agent_update.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json raw_tweets.txt
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "radar: auto-update data.json [skip ci]"
          git pull --rebase origin main
          git push origin main
