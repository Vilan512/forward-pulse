<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForwardPulse - 洞见未来</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'slate-background': '#0f172a',
                        'emerald-accent': '#10b981',
                    },
                    fontFamily: {
                        sans: ['"Space Grotesk"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', '"Fira Code"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; }

        #particle-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0.05;
        }

        .tab-btn {
            transition: all 0.25s ease;
            cursor: pointer;
        }
        .tab-btn:hover {
            background-color: rgba(16, 185, 129, 0.15);
            color: #34d399;
        }
        .tab-btn:focus-visible,
        .date-btn:focus-visible {
            outline: 2px solid #34d399;
            outline-offset: 2px;
        }
        .tab-btn.active {
            background-color: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border-color: #34d399;
        }

        .search-input {
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .search-input:focus {
            border-color: rgba(52, 211, 153, 0.6);
            box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.15);
            outline: none;
        }

        .tabs-scroll::-webkit-scrollbar { height: 0; }
        .tabs-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #34d399;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        /* Timeline Layout */
        .timeline-item {
            display: flex;
            flex-direction: row;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .timeline-left {
            width: 80px;
            flex-shrink: 0;
            position: relative;
            border-right: 1px solid rgba(255,255,255,0.08);
            padding-right: 16px;
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .timeline-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #06b6d4;
            box-shadow: 0 0 8px rgba(6, 182, 212, 0.5);
            position: absolute;
            right: -4px;
            top: 6px;
            z-index: 2;
        }

        .timeline-time {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            color: #06b6d4;
            margin-top: 2px;
        }

        .timeline-right {
            flex-grow: 1;
            min-width: 0;
            background-color: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 20px;
            margin-left: 16px;
            transition: background-color 0.2s ease;
        }

        .timeline-right:hover {
            background-color: rgba(255,255,255,0.05);
        }

        .timeline-featured .timeline-left {
            border-right-color: rgba(6, 182, 212, 0.2);
        }

        .timeline-featured .timeline-dot {
            width: 10px;
            height: 10px;
            right: -5px;
            top: 4px;
            box-shadow: 0 0 12px rgba(6, 182, 212, 0.6);
        }

        .meta-line {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
        }

        @media (max-width: 640px) {
            .timeline-left { width: 56px; padding-right: 12px; }
            .timeline-right { margin-left: 12px; padding: 14px; }
            .timeline-dot { right: -4px; }
        }

        .card-fade-out {
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
        }
        .card-fade-in {
            opacity: 1;
            transition: opacity 0.2s ease-in-out;
        }

        @media (prefers-reduced-motion: reduce) {
            .pulse-dot { animation: none; opacity: 1; }
            .card-fade-out, .card-fade-in { transition: none; }
        }

        ::selection {
            background-color: rgba(16, 185, 129, 0.3);
            color: #fff;
        }

        #drawer-overlay { transition: opacity 0.3s ease-in-out; }
        #source-drawer { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-slate-background text-slate-100 font-sans relative min-h-screen">

    <canvas id="particle-canvas" aria-hidden="true"></canvas>

    <header class="sticky top-0 z-50 bg-slate-background/70 backdrop-blur-2xl border-b border-white/5">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-14 sm:h-16 flex items-center justify-between gap-2">
            <div class="flex items-center gap-2 sm:gap-3 min-w-0">
                <div class="pulse-dot flex-shrink-0"></div>
                <h1 class="text-lg sm:text-xl font-bold text-white tracking-tighter truncate">Forward<span class="text-emerald-accent">Pulse</span></h1>
            </div>
            <p id="current-date" class="text-slate-500 font-mono text-xs sm:text-sm flex-shrink-0"></p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-10 relative z-10">

        <!-- Featured Ticker -->
        <section class="mb-8">
            <div class="flex items-center gap-2 mb-6">
                <div class="pulse-dot"></div>
                <h2 class="text-xs font-semibold uppercase tracking-[0.2em] text-emerald-accent/80">LATEST SIGNAL</h2>
            </div>
            <div id="featured-container">
                <div class="animate-pulse space-y-4">
                    <div class="h-4 w-48 bg-slate-800 rounded"></div>
                    <div class="h-8 w-3/4 bg-slate-800 rounded"></div>
                    <div class="h-4 w-full bg-slate-800 rounded"></div>
                    <div class="h-4 w-5/6 bg-slate-800 rounded"></div>
                    <div class="h-4 w-64 bg-slate-800 rounded mt-4"></div>
                </div>
            </div>
        </section>

        <!-- Control Panel -->
        <section class="mb-8 space-y-3">
            <div class="relative max-w-md">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>
                <label for="searchInput" class="sr-only">搜索情报关键词</label>
                <input id="searchInput" type="text" placeholder="搜索情报关键词..." aria-label="搜索情报关键词"
                    class="search-input w-full pl-11 pr-4 py-2.5 bg-slate-900/50 border border-white/10 rounded-lg text-sm text-slate-200 placeholder-slate-500">
            </div>
            <div class="flex gap-2 overflow-x-auto tabs-scroll pb-1 -mx-1 px-1" id="tabGroup" role="tablist">
                <button class="tab-btn active text-xs font-medium px-4 py-1.5 rounded-full border border-emerald-500/30 whitespace-nowrap" role="tab" aria-selected="true" data-filter="全部">全部</button>
                <button class="tab-btn text-xs font-medium px-4 py-1.5 rounded-full border border-white/10 text-gray-400 whitespace-nowrap" role="tab" data-filter="人工智能">人工智能</button>
                <button class="tab-btn text-xs font-medium px-4 py-1.5 rounded-full border border-white/10 text-gray-400 whitespace-nowrap" role="tab" data-filter="科技前沿">科技前沿</button>
                <button class="tab-btn text-xs font-medium px-4 py-1.5 rounded-full border border-white/10 text-gray-400 whitespace-nowrap" role="tab" data-filter="股票基金">股票基金</button>
            </div>
            <div id="dateTimeline" class="flex gap-2 overflow-x-auto tabs-scroll pb-1 -mx-1 px-1"></div>
        </section>

        <!-- Ticker Feed -->
        <section id="articles-grid" class="mb-12"></section>

        <!-- Load More -->
        <div class="flex justify-center mb-16">
            <button id="loadMoreBtn" style="display:none"
                class="text-xs font-medium px-6 py-2.5 rounded-full border border-white/10 text-slate-400 hover:text-emerald-400 hover:border-emerald-500/30 transition-all duration-300">
                加载更多历史情报
            </button>
        </div>

    </main>

    <footer class="border-t border-white/5 py-6 relative z-10">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-2 sm:gap-4">
            <span class="text-xs text-slate-600 font-mono">&copy; 2026 ForwardPulse</span>
            <span class="text-xs text-slate-700">数据来源仅供演示，不代表真实事件</span>
        </div>
    </footer>

    <!-- Drawer Overlay -->
    <div id="drawer-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] opacity-0 pointer-events-none"></div>

    <!-- Source Drawer -->
    <aside id="source-drawer" class="fixed top-0 right-0 h-screen w-full md:w-[45%] z-[70] translate-x-full bg-slate-900/95 backdrop-blur-xl border-l border-white/10 overflow-y-auto">
        <div class="sticky top-0 flex items-center justify-between p-4 border-b border-white/10 bg-slate-900/90 backdrop-blur-md">
            <h3 class="text-base font-bold text-white font-mono">DEEP ANALYSIS</h3>
            <button id="drawer-close-btn" aria-label="关闭" class="w-8 h-8 flex items-center justify-center rounded border border-white/10 text-slate-400 hover:text-white hover:border-emerald-500/50 transition-all duration-200 text-lg">&times;</button>
        </div>
        <div id="drawer-content" class="p-5 sm:p-8 space-y-6"></div>
    </aside>

    <script>
    (function () {
        // ── 1. 日期显示 ──────────────────────────────────
        var now = new Date();
        var weekdays = ['日','一','二','三','四','五','六'];
        document.getElementById('current-date').textContent =
            now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + String(now.getDate()).padStart(2,'0') + ' ' + ['SUN','MON','TUE','WED','THU','FRI','SAT'][now.getDay()];

        // ── 2. 粒子引擎 ─────────────────────────────────
        var canvas = document.getElementById('particle-canvas');
        var ctx = canvas.getContext('2d');
        var dpr = window.devicePixelRatio || 1;
        var W = window.innerWidth, H = window.innerHeight;
        var particles = [];
        var mouse = { x: -9999, y: -9999 };
        var currentR = 52, currentG = 211, currentB = 153;
        var targetR  = 52, targetG  = 211, targetB  = 153;
        var LERP_SPEED = 0.05;
        var animFrameId = null;
        var CONNECT_DIST = 180, MOUSE_DIST = 200, REPEL_FORCE = 0.8;

        function resize() {
            W = window.innerWidth; H = window.innerHeight;
            canvas.width = W * dpr; canvas.height = H * dpr;
            canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        function makeParticle() {
            return { x: Math.random()*W, y: Math.random()*H, vx: (Math.random()-0.5)*0.7, vy: (Math.random()-0.5)*0.7, r: Math.random()*1.8+1.2, white: Math.random()<0.25 };
        }
        function initParticles() {
            particles = [];
            var count = Math.max(40, Math.floor((W*H)/10000));
            for (var i=0;i<count;i++) particles.push(makeParticle());
        }
        resize(); initParticles();
        var resizeTimer;
        window.addEventListener('resize', function(){ clearTimeout(resizeTimer); resizeTimer=setTimeout(function(){ var oW=W,oH=H; resize(); for(var i=0;i<particles.length;i++){particles[i].x*=W/oW;particles[i].y*=H/oH;} var t=Math.max(40,Math.floor((W*H)/10000)); while(particles.length<t)particles.push(makeParticle()); },150); });
        document.addEventListener('mousemove', function(e){ mouse.x=e.clientX;mouse.y=e.clientY; });
        document.addEventListener('mouseleave', function(){ mouse.x=-9999;mouse.y=-9999; });

        function animate() {
            ctx.clearRect(0,0,W,H);
            currentR+=(targetR-currentR)*LERP_SPEED; currentG+=(targetG-currentG)*LERP_SPEED; currentB+=(targetB-currentB)*LERP_SPEED;
            var rgb=Math.round(currentR)+','+Math.round(currentG)+','+Math.round(currentB);
            for(var i=0;i<particles.length;i++){
                var p=particles[i];
                var mdx=p.x-mouse.x,mdy=p.y-mouse.y,mDist=Math.sqrt(mdx*mdx+mdy*mdy);
                if(mDist<MOUSE_DIST&&mDist>0){var f=(MOUSE_DIST-mDist)/MOUSE_DIST*REPEL_FORCE;p.vx+=(mdx/mDist)*f;p.vy+=(mdy/mDist)*f;}
                p.vx*=0.98;p.vy*=0.98;p.x+=p.vx;p.y+=p.vy;
                if(p.x<-10)p.x=W+10;if(p.x>W+10)p.x=-10;if(p.y<-10)p.y=H+10;if(p.y>H+10)p.y=-10;
                ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                ctx.fillStyle=p.white?'rgba(255,255,255,'+(0.03+Math.random()*0.03)+')':'rgba('+rgb+','+(0.04+Math.random()*0.04)+')';ctx.fill();
                for(var j=i+1;j<particles.length;j++){var p2=particles[j],ddx=p.x-p2.x,ddy=p.y-p2.y,d=Math.sqrt(ddx*ddx+ddy*ddy);if(d<CONNECT_DIST){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p2.x,p2.y);ctx.strokeStyle='rgba('+rgb+','+((1-d/CONNECT_DIST)*0.05+0.01)+')';ctx.lineWidth=0.6;ctx.stroke();}}
                if(mDist<MOUSE_DIST){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(mouse.x,mouse.y);ctx.strokeStyle='rgba('+rgb+','+((1-mDist/MOUSE_DIST)*0.15+0.03)+')';ctx.lineWidth=1;ctx.stroke();var glowR=p.r*(1+(1-mDist/MOUSE_DIST)*1.5);ctx.beginPath();ctx.arc(p.x,p.y,glowR,0,Math.PI*2);ctx.fillStyle='rgba('+rgb+','+(0.1+(1-mDist/MOUSE_DIST)*0.15)+')';ctx.fill();}
            }
            animFrameId=requestAnimationFrame(animate);
        }
        animate();
        document.addEventListener('visibilitychange',function(){if(document.hidden)cancelAnimationFrame(animFrameId);else animate();});

        // ── 3. 数据引擎 ─────────────────────────────────
        var CATEGORY_COLORS = {
            '人工智能': '#22d3ee',
            '科技前沿': '#34d399',
            '股票基金': '#c084fc'
        };
        var DEFAULT_COLOR = '#34d399';

        var allArticles = [];
        var currentFilter = '全部';
        var searchQuery = '';
        var currentPage = 1;
        var itemsPerPage = 10;
        var selectedDate = 'all';

        function getCatColor(cat) { return CATEGORY_COLORS[cat] || DEFAULT_COLOR; }

        function formatTime(dateStr) {
            if (!dateStr) return '--:--';
            var parts = dateStr.split(' ');
            if (parts.length >= 2) return parts[1].substring(0, 5);
            var d = parts[0].split('.');
            return d.length >= 3 ? d[1] + '-' + d[2] : dateStr;
        }

        function buildTimelineItem(a, isFeatured) {
            var color = getCatColor(a.category);
            var catStr = a.category || '未分类';
            var sourceStr = a.source_name || '';
            var articleJson = JSON.stringify(a).replace(/"/g, '&quot;');
            var cls = isFeatured ? 'timeline-item timeline-featured' : 'timeline-item';

            var left = '<div class="timeline-left">' +
                '<div class="timeline-dot"></div>' +
                '<div class="timeline-time">' + formatTime(a.date) + '</div>' +
            '</div>';

            var header = '<div class="flex items-center gap-2 mb-2 flex-wrap">' +
                (sourceStr ? '<span class="meta-line" style="color:#6b7280">' + sourceStr + '</span>' : '') +
                '<span class="meta-line px-2 py-0.5 rounded" style="color:' + color + ';background:' + color + '15">' + catStr + '</span>' +
            '</div>';

            var titleTag = isFeatured ? 'h1' : 'h3';
            var titleCls = isFeatured
                ? 'text-xl sm:text-2xl lg:text-3xl font-bold text-white leading-snug mb-3'
                : 'text-lg font-bold text-white leading-snug mb-2';

            var title = '<' + titleTag + ' class="' + titleCls + '">' + (a.title || '...') + '</' + titleTag + '>';

            var summary = '<p class="text-sm leading-relaxed mb-3" style="color:#9ca3af">' + (a.summary || '') + '</p>';

            var insight = '<p class="text-sm leading-relaxed mb-3" style="color:#4ade80">&#9889; 战略研判：' + (a.insight || '') + '</p>';

            var link = a.source_url
                ? '<a href="' + a.source_url + '" target="_blank" rel="noopener noreferrer" class="meta-line inline-block" style="color:#6b7280" data-article="' + articleJson + '">&#128279; 原文链接</a>'
                : '<button class="meta-line" style="color:#6b7280;cursor:pointer;background:none;border:none" data-article="' + articleJson + '">&#128279; 深度解析</button>';

            var right = '<div class="timeline-right view-source-btn">' + header + title + summary + insight + link + '</div>';

            return '<article class="' + cls + '" data-category="' + catStr + '">' + left + right + '</article>';
        }

        function renderFeatured(d) { return buildTimelineItem(d, true); }
        function renderCard(a) { return buildTimelineItem(a, false); }

        function renderArticles(articles) {
            var visible = articles.slice(0, currentPage * itemsPerPage);
            var html = '';
            visible.forEach(function (a) { html += renderCard(a); });
            var grid = document.getElementById('articles-grid');
            if (html) {
                grid.innerHTML = html;
                grid.classList.remove('card-fade-out');
                void grid.offsetWidth;
                grid.classList.add('card-fade-in');
            } else {
                grid.innerHTML = '<div class="text-center py-16 text-slate-600 font-mono text-sm">NO MATCHING SIGNALS</div>';
            }
            var btn = document.getElementById('loadMoreBtn');
            if (btn) {
                if (visible.length >= articles.length) { btn.style.display = 'none'; }
                else { btn.style.display = ''; btn.textContent = '加载更多 (' + visible.length + '/' + articles.length + ')'; }
            }
            bindColorSync();
        }

        function applyFilters(resetPage) {
            if (resetPage) currentPage = 1;
            var filtered = allArticles.filter(function (a) {
                var matchCat = (currentFilter === '全部') || (a.category === currentFilter);
                var matchDate = (selectedDate === 'all') || ((a.date||'').indexOf(selectedDate) === 0);
                var matchQ = !searchQuery || (a.title||'').indexOf(searchQuery)!==-1 || (a.summary||'').indexOf(searchQuery)!==-1 || (a.insight||'').indexOf(searchQuery)!==-1 || (a.category||'').indexOf(searchQuery)!==-1;
                return matchCat && matchDate && matchQ;
            });
            renderArticles(filtered);
        }

        function initTabs() {
            var tabs = document.querySelectorAll('#tabGroup .tab-btn');
            tabs.forEach(function (tab) {
                tab.addEventListener('click', function () {
                    tabs.forEach(function (t) { t.classList.remove('active'); t.classList.add('border-white/10','text-gray-400'); t.classList.remove('border-emerald-500/30'); });
                    this.classList.add('active'); this.classList.remove('border-white/10','text-gray-400'); this.classList.add('border-emerald-500/30');
                    currentFilter = this.dataset.filter;
                    applyFilters(true);
                });
            });
        }

        function initSearch() {
            var input = document.getElementById('searchInput'), dt;
            input.addEventListener('input', function () { clearTimeout(dt); dt=setTimeout(function(){ searchQuery=input.value.trim(); applyFilters(true); },200); });
        }

        var COLOR_MAP = { '人工智能':[34,211,238], '科技前沿':[52,211,153], '股票基金':[168,85,247] };
        var DEFAULT_C = [52,211,153];
        function bindColorSync() {
            var c = document.getElementById('articles-grid');
            c.onmouseenter = function(e){ var el=e.target.closest('[data-category]'); if(el){var rgb=COLOR_MAP[el.dataset.category]||DEFAULT_C; targetR=rgb[0];targetG=rgb[1];targetB=rgb[2];} };
            c.onmouseleave = function(e){ var el=e.target.closest('[data-category]'); if(el){targetR=DEFAULT_C[0];targetG=DEFAULT_C[1];targetB=DEFAULT_C[2];} };
        }

        // Drawer
        function openDrawer(data) {
            var content = document.getElementById('drawer-content');
            var color = getCatColor(data.category);
            var html = '';
            html += '<div class="meta-line mb-4"><span style="color:#06b6d4">' + (data.date||'') + '</span><span class="mx-1 text-slate-600">|</span><span style="color:' + color + '">【' + (data.category||'') + '】</span></div>';
            html += '<h2 class="text-2xl font-bold text-white leading-snug mb-6">' + (data.title||'') + '</h2>';
            if(data.full_translation){ html += '<div class="mb-6"><h4 class="meta-line text-emerald-400 mb-3 uppercase tracking-wider">Translation</h4><div class="bg-slate-800/50 rounded-lg p-5 text-sm text-slate-200 leading-relaxed whitespace-pre-wrap font-mono">' + data.full_translation + '</div></div>'; }
            if(data.original_text){ html += '<div class="mb-6"><h4 class="meta-line text-slate-500 mb-3 uppercase tracking-wider">Original Text</h4><div class="bg-slate-800/80 rounded-lg p-5 text-sm text-slate-300 leading-relaxed font-mono whitespace-pre-wrap border-l-2 border-emerald-500/20">' + data.original_text + '</div></div>'; }
            if(data.insight){ html += '<div class="mb-6"><h4 class="meta-line text-slate-500 mb-3 uppercase tracking-wider">Strategic Insight</h4><p class="text-base leading-relaxed" style="color:#4ade80">&#9889; ' + data.insight + '</p></div>'; }
            if(data.source_url){ html += '<div class="pt-4 border-t border-white/10"><a href="' + data.source_url + '" target="_blank" rel="noopener noreferrer" class="meta-line text-slate-400 hover:text-emerald-400 transition-colors">[&#128279; ' + (data.source_name||'原文链接') + ']</a></div>'; }
            content.innerHTML = html;
            document.getElementById('drawer-overlay').classList.remove('opacity-0','pointer-events-none');
            document.getElementById('drawer-overlay').classList.add('opacity-100');
            document.getElementById('source-drawer').classList.remove('translate-x-full');
            document.body.style.overflow = 'hidden';
        }
        function closeDrawer() {
            document.getElementById('drawer-overlay').classList.add('opacity-0','pointer-events-none');
            document.getElementById('drawer-overlay').classList.remove('opacity-100');
            document.getElementById('source-drawer').classList.add('translate-x-full');
            document.body.style.overflow = '';
        }
        document.addEventListener('click', function(e){
            if(e.target.closest('#drawer-close-btn')){closeDrawer();return;}
            if(e.target.id==='drawer-overlay'){closeDrawer();return;}
            var btn=e.target.closest('.view-source-btn');
            if(btn){e.stopPropagation();var el=btn.querySelector('[data-article]')||btn;try{openDrawer(JSON.parse(el.dataset.article));}catch(err){console.error(err);}}
        });
        document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDrawer();});

        function initLoadMore() {
            document.getElementById('loadMoreBtn').addEventListener('click',function(){currentPage++;applyFilters(false);});
        }

        function renderTimeline() {
            var dates=[],seen={};
            allArticles.forEach(function(a){var d=(a.date||'').split(' ')[0];if(d&&!seen[d]){seen[d]=true;dates.push(d);}});
            dates.sort(function(a,b){return b.localeCompare(a);});
            var c=document.getElementById('dateTimeline');
            if(dates.length<2){c.style.display='none';return;}
            c.style.display='';
            var h='<button class="date-btn active text-xs font-medium px-4 py-1.5 rounded-full border border-emerald-500/30 text-emerald-400 whitespace-nowrap transition-all duration-200" data-date="all">全部时间</button>';
            dates.forEach(function(d){h+='<button class="date-btn text-xs font-medium px-4 py-1.5 rounded-full border border-white/10 text-slate-400 whitespace-nowrap transition-all duration-200 hover:text-emerald-400 hover:border-emerald-500/30" data-date="'+d+'">'+d+'</button>';});
            c.innerHTML=h;
            var btns=c.querySelectorAll('.date-btn');
            btns.forEach(function(btn){btn.addEventListener('click',function(){btns.forEach(function(b){b.classList.remove('active','text-emerald-400','border-emerald-500/30');b.classList.add('text-slate-400','border-white/10');});this.classList.add('active','text-emerald-400','border-emerald-500/30');this.classList.remove('text-slate-400','border-white/10');selectedDate=this.dataset.date;applyFilters(true);});});
        }

        // ── 启动 ───────────────────────────────────────
        initTabs(); initSearch(); initLoadMore();

        function fetchAndRenderData() {
            fetch('data.json')
                .then(function(res){if(!res.ok)throw new Error('HTTP '+res.status);return res.json();})
                .then(function(data){
                    var articles = data.articles || [];
                    if(articles.length>0){document.getElementById('featured-container').innerHTML=renderFeatured(articles[0]);}
                    allArticles = articles.slice(1);
                    renderTimeline();
                    applyFilters(true);
                })
                .catch(function(err){
                    console.error('数据加载失败:',err);
                    document.getElementById('featured-container').innerHTML='<div class="text-red-400 font-mono text-sm">ERROR: '+err.message+'</div>';
                });
        }
        fetchAndRenderData();
    })();
    </script>
</body>
</html>
